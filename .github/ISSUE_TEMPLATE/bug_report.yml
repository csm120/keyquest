name: Bug report
description: Report a problem with gameplay, accessibility, installation, or releases
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem in KeyQuest.

        Use this form for broken behavior, regressions, crashes, screen reader issues, keyboard problems, packaging bugs, or anything else that is not working as expected.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the project is affected?
      options:
        - Gameplay
        - Accessibility
        - Screen reader support
        - Keyboard navigation
        - Installer or portable build
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which KeyQuest version are you using?
      placeholder: "Example: 1.3.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Windows version
      description: Which Windows version are you using?
      options:
        - Windows 11
        - Windows 10
        - Windows 8.1
        - Windows 7
        - Other
    validations:
      required: false
  - type: dropdown
    id: assistive-tech
    attributes:
      label: Assistive technology
      description: If relevant, which screen reader or assistive tech were you using?
      options:
        - NVDA
        - JAWS
        - Narrator
        - Other screen reader
        - None
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the problem.
      placeholder: |
        1. Open KeyQuest
        2. Start a lesson
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error details or logs
      description: Paste any error message, traceback, or relevant details from `keyquest_error.log`.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I included enough detail to reproduce the problem.
          required: true
