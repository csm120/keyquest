name: Feature request
description: Suggest a gameplay, accessibility, or usability improvement
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to KeyQuest.

        Use this form for new game ideas, accessibility enhancements, quality-of-life improvements, content additions, or workflow suggestions.
  - type: dropdown
    id: category
    attributes:
      label: Request type
      description: What kind of improvement are you proposing?
      options:
        - Gameplay improvement
        - Accessibility improvement
        - Screen reader improvement
        - Keyboard navigation improvement
        - New content
        - Documentation improvement
        - Release or installer improvement
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need, limitation, or frustration would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any other approaches you considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add screenshots, examples, classroom use cases, or accessibility context here.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions first.
          required: true
        - label: This request describes a concrete improvement, not just a general complaint.
          required: true
