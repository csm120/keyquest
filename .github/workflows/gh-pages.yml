name: Deploy to gh-pages
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app

      # Keep GitHub Pages paths working even if something injects absolute URLs
      - name: Enforce /keyquest/ base in dist/index.html
        run: |
          sed -i 's|src="/assets/|src="/keyquest/assets/|g' dist/index.html
          sed -i 's|href="/assets/|href="/keyquest/assets/|g' dist/index.html
          sed -i 's|href="/manifest.webmanifest"|href="/keyquest/manifest.webmanifest"|g' dist/index.html
          sed -i 's|src="/registerSW.js"|src="/keyquest/registerSW.js"|g' dist/index.html
          sed -i 's|href="/vite.svg"|href="/keyquest/vite.svg"|g' dist/index.html
        working-directory: app

      # SPA fallback so deep links serve your app
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html
        working-directory: app

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: app/dist
