<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">KeyQuest hero image</title>
  <desc id="desc">Decorative banner for KeyQuest showing the project name, the phrase accessible typing adventure for Windows, and keyboard-inspired panels on a high-contrast blue and gold background.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="55%" stop-color="#12344d"/>
      <stop offset="100%" stop-color="#205072"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#f3ebd0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#08111a" flood-opacity="0.28"/>
    </filter>
    <style>
      .display { font: 700 76px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 600 30px 'Segoe UI', Arial, sans-serif; fill: #16324f; }
      .body { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #244564; }
      .pill { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .keytext { font: 700 28px Consolas, 'Courier New', monospace; fill: #102a43; }
      .small { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #f8fbff; letter-spacing: 1.5px; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="170" fill="#2c7da0" opacity="0.18"/>
  <circle cx="150" cy="590" r="210" fill="#ffd166" opacity="0.11"/>
  <circle cx="1060" cy="550" r="110" fill="#fff8e7" opacity="0.08"/>
  <path d="M0 538C182 468 260 467 391 507C531 550 642 630 826 601C959 580 1061 510 1200 456V675H0Z" fill="#08111a" opacity="0.22"/>

  <rect x="82" y="74" width="722" height="486" rx="34" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="82" y="74" width="722" height="486" rx="34" fill="none" stroke="#d7c9a0" stroke-width="2"/>

  <rect x="128" y="122" width="246" height="48" rx="24" fill="url(#accent)"/>
  <text x="160" y="153" class="pill">ACCESSIBLE TYPING ADVENTURE</text>

  <text x="128" y="248" class="display">KeyQuest</text>
  <text x="128" y="304" class="subtitle">A Windows typing game built for keyboard,</text>
  <text x="128" y="344" class="subtitle">screen reader, and low-vision users.</text>

  <text x="128" y="420" class="body">Practice through lessons, sentence sets, and games</text>
  <text x="128" y="456" class="body">with clear audio feedback and consistent navigation.</text>

  <rect x="128" y="490" width="204" height="40" rx="20" fill="#102a43"/>
  <text x="156" y="516" class="small">PYTHON  •  WINDOWS</text>

  <g transform="translate(835 104)">
    <rect x="0" y="0" width="285" height="195" rx="28" fill="#f7fbff" opacity="0.96" filter="url(#shadow)"/>
    <rect x="0" y="0" width="285" height="195" rx="28" fill="none" stroke="#d6e6f2" stroke-width="2"/>
    <text x="28" y="44" class="subtitle">Keyboard-first play</text>

    <rect x="28" y="68" width="70" height="58" rx="12" fill="#e7f0f7" stroke="#b9cfdf" stroke-width="2"/>
    <rect x="108" y="68" width="70" height="58" rx="12" fill="#e7f0f7" stroke="#b9cfdf" stroke-width="2"/>
    <rect x="188" y="68" width="70" height="58" rx="12" fill="#e7f0f7" stroke="#b9cfdf" stroke-width="2"/>
    <text x="52" y="105" class="keytext">A</text>
    <text x="132" y="105" class="keytext">S</text>
    <text x="212" y="105" class="keytext">D</text>

    <rect x="68" y="134" width="70" height="40" rx="10" fill="#ffd166"/>
    <rect x="148" y="134" width="70" height="40" rx="10" fill="#f4a261"/>
    <text x="83" y="160" class="pill">TYPE</text>
    <text x="158" y="160" class="pill">PLAY</text>
  </g>

  <g transform="translate(870 348)">
    <rect x="0" y="0" width="246" height="154" rx="26" fill="#102a43" opacity="0.96" filter="url(#shadow)"/>
    <text x="28" y="42" class="small">SCREEN READER FRIENDLY</text>
    <rect x="28" y="62" width="190" height="14" rx="7" fill="#90cdf4"/>
    <rect x="28" y="89" width="156" height="14" rx="7" fill="#ffd166"/>
    <rect x="28" y="116" width="174" height="14" rx="7" fill="#f4a261"/>
  </g>

  <g opacity="0.32">
    <rect x="942" y="560" width="42" height="42" rx="8" fill="#fff8e7"/>
    <rect x="992" y="560" width="42" height="42" rx="8" fill="#fff8e7"/>
    <rect x="1042" y="560" width="42" height="42" rx="8" fill="#fff8e7"/>
    <rect x="1092" y="560" width="42" height="42" rx="8" fill="#fff8e7"/>
  </g>
</svg>
